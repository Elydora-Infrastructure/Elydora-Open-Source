name: Feature Request
description: Suggest a new feature for Elydora
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API Server
        - Console
        - Node SDK
        - Python SDK
        - Go SDK
        - Helm Chart
        - Protocol
        - Other
    validations:
      required: true
