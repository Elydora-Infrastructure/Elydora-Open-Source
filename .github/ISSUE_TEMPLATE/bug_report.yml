name: Bug Report
description: Report a bug in Elydora
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Deploy Elydora with docker compose
        2. Submit an operation via the Node SDK
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API Server
        - Console
        - Node SDK
        - Python SDK
        - Go SDK
        - Helm Chart
        - Docker Compose
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Node/Python/Go version, Elydora version.
      placeholder: "macOS 14, Docker 25.0, Node 20, Elydora v0.1.0"
