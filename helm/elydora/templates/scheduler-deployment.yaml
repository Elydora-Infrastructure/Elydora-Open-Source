apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: {{ include "elydora.namespace" . }}
  labels:
    {{- include "elydora.labels" . | nindent 4 }}
    app: scheduler
spec:
  replicas: {{ .Values.replicaCount.scheduler }}
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          command: ["node", "dist/scheduler.js"]
          envFrom:
            - configMapRef:
                name: elydora-config
            - secretRef:
                name: elydora-secret
          resources:
            {{- toYaml .Values.resources.scheduler | nindent 12 }}
